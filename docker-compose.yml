services:
  pyrmap:
    build: .
    container_name: pyrmap
    restart: unless-stopped
    # ${VAR} interpolation, not env_file: a literal .env file only exists for local `docker
    # compose` runs (auto-read from the project directory) — Portainer's GitOps deploys clone a
    # fresh checkout with no .env file, but do inject its own "Environment variables" stack
    # config into the process that runs compose, which this reads from instead.
    environment:
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY}
      - PORT=${PORT:-8080}
      - DB_PATH=${DB_PATH:-/data/pyrmap.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - EUMETSAT_CONSUMER_KEY=${EUMETSAT_CONSUMER_KEY:-}
      - EUMETSAT_CONSUMER_SECRET=${EUMETSAT_CONSUMER_SECRET:-}
      - LSASAF_USERNAME=${LSASAF_USERNAME:-}
      - LSASAF_PASSWORD=${LSASAF_PASSWORD:-}
      - X_BEARER_TOKEN=${X_BEARER_TOKEN:-}
      - AUTH_USERNAME=${AUTH_USERNAME:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
    ports:
      - "48080:8080"
    volumes:
      # Absolute path via HOST_DATA_DIR for Portainer GitOps deploys — a relative "./data" would
      # resolve inside Portainer's own ephemeral git-clone working directory (verified live,
      # 2026-07-20: that whole directory gets removed on stack deletion, taking the database with
      # it). Defaults to the old relative behavior for plain local `docker compose up`, where the
      # working directory is a path you control directly and this risk doesn't apply.
      - ${HOST_DATA_DIR:-./data}:/data
